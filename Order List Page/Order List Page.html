<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order List · EOS Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* TOKENS — sourced from EOS Cloud Component Library Figma */
    --ink: #252525;            /* primary text */
    --ink-2: #616161;          /* secondary text */
    --ink-3: #ACACAC;          /* tertiary / inactive */
    --line: #EBEBEB;           /* cell borders, hover bg */
    --pin: rgba(9,9,9,0.15);   /* "pin line" dividers */
    --bg: #FFFFFF;
    --bg-soft: #FAFAFA;
    --black: #000000;          /* tooltip border */
    --ink-deep: #090909;
    --brand: #E22D00;          /* EOS red — switch ON, brand mark */
    --brand-soft: #FFF6F4;
    --green: #00816C;          /* status: confirmed/completed */
    --blue: #28628E;
    --amber: #B0843D;
    --red: #C84757;
    --yellow: #F8DE84;         /* avatar */
    --shadow-pop: 8px 8px 32px rgba(0,0,0,0.15);
    --radius: 5px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'cv11';
    letter-spacing: 0.010em;
  }
  button { font-family: inherit; letter-spacing: 0.010em; }
  input { font-family: inherit; letter-spacing: 0.010em; }
  ::selection { background: var(--ink); color: #fff; }
  /* scrollbar polish */
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: #D6D6D6; border-radius: 6px; border: 2px solid #fff; }
  *::-webkit-scrollbar-thumb:hover { background: #ACACAC; }
  *::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="order-data.jsx"></script>
<script type="text/babel" src="order-icons.jsx"></script>
<script type="text/babel" src="nav-drawer.jsx"></script>
<script type="text/babel" src="order-list.jsx"></script>
</body>
</html>
